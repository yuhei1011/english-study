<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVO Power Challenge! - Slim Edition</title>
    <style>
        :root {
            --primary: #3498db;
            --success: #2ecc71;
            --error: #e74c3c;
            --bg: #f8f9fa;
        }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .quiz-container { max-width: 850px; width: 100%; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; box-sizing: border-box; }
        h1 { color: #2c3e50; text-align: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-top: 0; font-size: 1.8em; }
        .instruction { font-size: 0.9em; color: #7f8c8d; margin-bottom: 20px; text-align: center; line-height: 1.5; }
        
        .question-card { border-bottom: 2px dashed #eee; padding: 20px 0; margin-bottom: 10px; }
        .level-label { font-size: 0.7em; background: #e0e0e0; padding: 2px 8px; border-radius: 10px; color: #555; font-weight: bold; }
        .translation { font-size: 0.85em; color: #34495e; margin: 5px 0; font-weight: bold; display: block; }
        
        .drop-container { position: relative; margin: 10px 0; }
        .drop-area { 
            min-height: 70px; border: 2px solid #ddd; border-radius: 12px; padding: 10px 50px 10px 15px; 
            display: flex; flex-wrap: wrap; gap: 10px; background: #fafafa; transition: 0.3s;
            justify-content: flex-start; align-items: center;        
        }

        /* ★ 文頭自動大文字化（高さ2.2emに連動） ★ */
        .drop-area .chunk-tile:first-child {
            display: inline-block; 
            line-height: 2.2em; /* タイルの高さに合わせる */
        }
        .drop-area .chunk-tile:first-child::first-letter {
            text-transform: uppercase !important;
        }
        
        .period-mark { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); font-size: 30px; font-weight: bold; color: #333; }
        .correct-bg { background: #e8f8f5; border-color: var(--success); }
        .error-bg { background: #fdedec; border-color: var(--error); }

        .pool-area { min-height: 60px; padding: 15px; display: flex; flex-wrap: wrap; gap: 10px; background: #fff; border: 1px solid #eee; border-radius: 10px; margin-top: 10px; justify-content: flex-start; align-items: center; }
        
        /* ★ チャンクタイルの高さ設定（文字の高さの約2倍） ★ */
        .chunk-tile { 
            background: white; border: 2px solid #3498db; padding: 0 20px; border-radius: 35px; 
            cursor: pointer; user-select: none; transition: 0.2s; box-shadow: 0 3px 6px rgba(0,0,0,0.08); 
            font-weight: 600; color: #2c3e50; text-align: center; white-space: nowrap; 
            display: flex; align-items: center; justify-content: center; 
            height: 2.2em; /* 文字の高さの2倍強 */
            font-size: 1em;
        }
        .chunk-tile:hover { background: #3498db; color: white; transform: translateY(-2px); }

        @media (max-width: 600px) { 
            .chunk-tile { padding: 0 14px; font-size: 0.85em; height: 2.2em; } 
            .drop-area { min-height: 60px; padding-right: 40px; } 
            .btn { padding: 10px 25px; font-size: 0.9em; } 
        }

        .controls { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 20px; }
        .button-group { display: flex; gap: 20px; justify-content: center; }
        .btn { padding: 0 35px; border: none; border-radius: 50px; cursor: pointer; font-weight: 900; font-size: 1.1em; transition: 0.2s; box-shadow: 0 4px 0px rgba(0,0,0,0.1); letter-spacing: 1px; height: 2.4em; display: flex; align-items: center; }
        .btn-check { background: var(--primary); color: white; }
        .btn-check:disabled { background: #bdc3c7; cursor: not-allowed; box-shadow: none; transform: none; }
        .btn-reset { background: #bdc3c7; color: white; }
        
        .result-msg { font-weight: 900; font-size: 1.3em; height: 1.5em; text-align: center; }
        .power-text { color: #f39c12; font-style: italic; animation: bounce 0.5s infinite alternate; display: inline-block; }
        @keyframes bounce { from { transform: scale(1) rotate(-5deg); } to { transform: scale(1.3) rotate(5deg); } }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>SVO Power! 💪</h1>
    <div class="instruction">
        タイルを並べて [CHECK] を押そう！<br>
        11-15問目は準2級〜準1級レベルの挑戦だ！
    </div>
    <div id="quiz-list"></div>
</div>

<script>
    const correctSound = new Audio('nakayama-kinnikun-power.mp3');
    const errorSound = new Audio('nakayama-kinnikun-dotti.mp3');
    let isPlaying = false;

    // 全15問のデータセット
    const quizData = [
        { tiles: ["I", "eat", "lunch"], validAnswers: ["i eat lunch"], jp: "私は昼食を食べます。", lv: "Basic" },
        { tiles: ["she", "drinks", "milk"], validAnswers: ["she drinks milk"], jp: "彼女は牛乳を飲みます。", lv: "Basic" },
        { tiles: ["the cat", "caught", "a small mouse"], validAnswers: ["the cat caught a small mouse"], jp: "その猫は小さなネズミを捕まえました。", lv: "Basic" },
        { tiles: ["they", "study", "English", "every day"], validAnswers: ["they study english every day", "every day they study english"], jp: "彼らは毎日英語を勉強します。", lv: "Adverb" },
        { tiles: ["he", "plays", "tennis", "very well"], validAnswers: ["he plays tennis very well"], jp: "彼はとても上手にテニスをします。", lv: "Adverb" },
        { tiles: ["the teacher", "speaks", "English", "slowly", "in the room"], validAnswers: ["the teacher speaks english slowly in the room", "the teacher slowly speaks english in the room"], jp: "先生は教室でゆっくり英語を話します。", lv: "Adverb+" },
        { tiles: ["students", "practice", "soccer", "hard", "every day"], validAnswers: ["students practice soccer hard every day", "every day students practice soccer hard"], jp: "生徒たちは毎日一生懸命サッカーを練習します。", lv: "Adverb+" },
        { tiles: ["I", "play", "games", "with my friends", "at home", "on Sundays"], validAnswers: ["i play games with my friends at home on sundays", "on sundays i play games with my friends at home"], jp: "私は日曜日に家で友達とゲームをします。", lv: "Adverb Storm" },
        { tiles: ["my brother", "wants", "a big cake", "for his birthday"], validAnswers: ["my brother wants a big cake for his birthday"], jp: "兄は誕生日に大きなケーキを欲しがっています。", lv: "Challenge" },
        { tiles: ["we", "use", "the computers", "in the room"], validAnswers: ["we use the computers in the room"], jp: "私たちはその部屋でコンピュータを使います。", lv: "Challenge" },
        { tiles: ["many people", "protect", "the environment", "around the world"], validAnswers: ["many people protect the environment around the world", "around the world many people protect the environment"], jp: "世界中の多くの人々が環境を保護しています。", lv: "Pre-2+" },
        { tiles: ["the new library", "provides", "useful books", "for students"], validAnswers: ["the new library provides useful books for students"], jp: "その新しい図書館は生徒たちのために役立つ本を提供しています。", lv: "Pre-2+" },
        { tiles: ["she", "achieved", "her goal", "with a lot of effort"], validAnswers: ["she achieved her goal with a lot of effort"], jp: "彼女は多大なる努力で目標を達成しました。", lv: "Pre-2+" },
        { tiles: ["Watching too many videos", "changes", "our way of thinking", "slowly"], validAnswers: ["watching too many videos changes our way of thinking slowly", "watching too many videos slowly changes our way of thinking"], jp: "動画をたくさん見ることは、私たちの考え方をゆっくり変えます。", lv: "Structure+" },
        { 
            tiles: ["technological advancements", "significantly", "improve", "our quality of life", "by providing", "new opportunities", "in various fields", "today"], 
            validAnswers: [
                "technological advancements significantly improve our quality of life by providing new opportunities in various fields today",
                "technological advancements improve our quality of life significantly by providing new opportunities in various fields today",
                "today technological advancements significantly improve our quality of life by providing new opportunities in various fields",
                "today technological advancements improve our quality of life significantly by providing new opportunities in various fields"
            ], 
            jp: "今日、技術の進歩は様々な分野で新しい機会を提供することによって、私たちの生活の質を著しく向上させています。", 
            lv: "Pre-1 Ultimate" 
        }
    ];

    function shuffle(array) {
        let arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    const quizList = document.getElementById('quiz-list');

    quizData.forEach((data, i) => {
        const shuffledTiles = shuffle(data.tiles);
        const card = document.createElement('div');
        card.className = 'question-card';
        card.innerHTML = `
            <div><span class="level-label">${data.lv}</span> <strong>Q${i+1}</strong></div>
            <span class="translation">${data.jp}</span>
            <div class="drop-container">
                <div class="drop-area" id="drop-${i}"></div>
                <span class="period-mark">.</span>
            </div>
            <div class="pool-area" id="pool-${i}"></div>
            <div class="controls">
                <div id="msg-${i}" class="result-msg"></div>
                <div class="button-group">
                    <button class="btn btn-reset" onclick="reset(${i})">RESET</button>
                    <button class="btn btn-check" id="check-btn-${i}" onclick="check(${i})">CHECK</button>
                </div>
            </div>
        `;
        quizList.appendChild(card);

        const pool = document.getElementById(`pool-${i}`);
        shuffledTiles.forEach(text => {
            const tile = document.createElement('div');
            tile.className = 'chunk-tile';
            tile.textContent = text;
            tile.onclick = () => moveTile(tile, i);
            pool.appendChild(tile);
        });
    });

    function moveTile(tile, qIdx) {
        const drop = document.getElementById(`drop-${qIdx}`);
        const pool = document.getElementById(`pool-${qIdx}`);
        const msg = document.getElementById(`msg-${qIdx}`);
        if (tile.parentElement === pool) drop.appendChild(tile);
        else pool.appendChild(tile);
        msg.textContent = "";
        drop.className = "drop-area";
    }

    function check(idx) {
        if (isPlaying) return;
        const drop = document.getElementById(`drop-${idx}`);
        const msg = document.getElementById(`msg-${idx}`);
        const checkBtn = document.getElementById(`check-btn-${idx}`);
        const userAns = Array.from(drop.children).map(t => t.textContent.toLowerCase()).join(' ');
        const isCorrect = quizData[idx].validAnswers.includes(userAns);
        
        isPlaying = true;
        checkBtn.disabled = true;

        if (isCorrect) {
            correctSound.currentTime = 0;
            correctSound.play();
            msg.innerHTML = '<span class="power-text">POWER!!</span>';
            drop.className = "drop-area correct-bg";
            correctSound.onended = () => { isPlaying = false; checkBtn.disabled = false; };
        } else {
            errorSound.currentTime = 4;
            errorSound.play();
            msg.textContent = "❌ どっちなんだい！？";
            msg.style.color = "var(--error)";
            drop.className = "drop-area error-bg";
            errorSound.onended = () => { isPlaying = false; checkBtn.disabled = false; };
        }
    }

    function reset(idx) {
        const drop = document.getElementById(`drop-${idx}`);
        const pool = document.getElementById(`pool-${idx}`);
        const msg = document.getElementById(`msg-${idx}`);
        const checkBtn = document.getElementById(`check-btn-${idx}`);
        while (drop.firstChild) pool.appendChild(drop.firstChild);
        msg.textContent = "";
        drop.className = "drop-area";
        isPlaying = false;
        checkBtn.disabled = false;
        correctSound.pause();
        errorSound.pause();
    }
</script>

</body>
</html>
